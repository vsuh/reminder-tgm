<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование ntfy-канала</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css"
          crossorigin="anonymous">
</head>
<body>
<div class="container mt-5">
    <h1>Редактирование ntfy-канала #{{ channel.id }}</h1>
    <form method="post">
        <div class="form-group">
            <label for="name">Название канала:</label>
            <input type="text" class="form-control" id="name" name="name"
                   required value="{{ channel.name }}">
        </div>

        <div class="form-group">
            <label for="url">URL:</label>
            <input type="text" class="form-control" id="url" name="url"
                   required value="{{ channel.url }}">
            <small class="form-text text-muted">
                Например: https://ntfy.sh/mytopic
            </small>
        </div>

        <div class="form-group">
            <label for="title">Заголовок (опционально):</label>
            <input type="text" class="form-control" id="title" name="title"
                   value="{{ channel.title or '' }}">
        </div>

        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{{ url_for('ntfy_view') }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
</body>
</html>
