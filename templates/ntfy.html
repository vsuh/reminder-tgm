<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ntfy каналы</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.1.0/css/all.css" crossorigin="anonymous">
</head>
<body>
<div class="container mt-5">
    <h1>ntfy каналы</h1>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>URL</th>
                    <th>Title</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
            {% for ch in channels %}
                <tr>
                    <td>{{ ch.id }}</td>
                    <td>{{ ch.name }}</td>
                    <td>{{ ch.url }}</td>
                    <td>{{ ch.title }}</td>
                    <td>
                        <a href="{{ url_for('edit_ntfy_channel_view', channel_id=ch.id) }}"
                           class="btn btn-sm btn-primary">Редактировать</a>
                        <a href="{{ url_for('delete_ntfy_channel_view', channel_id=ch.id) }}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Удалить ntfy-канал {{ ch.name }}?')">
                            Удалить
                        </a>
                    </td>
                </tr>
            {% endfor %}
            </tbody>
        </table>

    <h2>Добавить канал</h2>
    <form method="POST">
        <div class="mb-3">
            <label for="name" class="form-label">Название:</label>
            <input type="text" class="form-control" id="name" name="name" required
                   placeholder="Например: Рабочие уведомления">
        </div>
        <div class="mb-3">
            <label for="url" class="form-label">URL топика:</label>
            <input type="text" class="form-control" id="url" name="url" required
                   placeholder="Например: https://ntfy.sh/my-topic">
        </div>
        <div class="mb-3">
            <label for="title" class="form-label">Заголовок уведомления <span class="text-muted">(необязательно)</span>:</label>
            <input type="text" class="form-control" id="title" name="title"
                   placeholder="Например: Напоминание">
        </div>
        <button type="submit" class="btn btn-warning">
            <i class="fas fa-plus"></i> Добавить
        </button>
        <a href="/" class="btn btn-primary">
            <i class="fas fa-backward fa-xl" style="color: #FFD43B;"></i>&nbsp;
            Вернуться к списку расписаний
        </a>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
