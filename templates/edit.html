<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование расписания</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css"
          crossorigin="anonymous">
</head>
<body>
<div class="container mt-5">
    <h1>Редактирование расписания #{{ schedule.id }}</h1>
    <form method="post">
        <div class="form-group">
            <label for="cron">CRON выражение:</label>
            <input type="text" class="form-control" id="cron" name="cron" required value="{{ schedule.cron }}">
        </div>

        <div class="form-group">
            <label for="message">Сообщение:</label>
            <textarea class="form-control" id="message" name="message" rows="3" required>{{ schedule.message }}</textarea>
        </div>

        <div class="form-group">
            <label for="chat_id">Chat:</label>
            <select class="form-control" id="chat_id" name="chat_id">
                {% for chat in chats %}
                <option value="{{ chat.id }}" {% if chat.id == schedule.chat_id %}selected{% endif %}>
                    {{ chat.name }} (CHAT_ID: {{ chat.chat_id }})
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="ntfy_id">ntfy канал (опционально):</label>
            <select class="form-control" id="ntfy_id" name="ntfy_id">
                <option value="">-- без ntfy --</option>
                {% for ch in ntfy_channels %}
                <option value="{{ ch.id }}" {% if schedule.ntfy_id == ch.id %}selected{% endif %}>
                    {{ ch.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="modifier">Модификатор:</label>
            <input type="text" class="form-control" id="modifier" name="modifier"
                   value="{{ schedule.modifier or '' }}">
        </div>

        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{{ url_for('schedules_view') }}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
</body>
</html>
