name: Build, Push & Notify

on:
  push:
    tags:
      - 'v*'  

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}  

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/vsuh/cron-tg
          tags: |
            type=semver,pattern={{version}}       # v1.2.3 → 1.2.3
            type=semver,pattern={{major}}.{{minor}} # v1.2.3 → 1.2
            type=raw,value=latest                 # всегда тег latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-container:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Trigger container repo workflow
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: vsuh/cron-tg-docker
          event-type: new-reminder-tgm-tag
          client-payload: >
            {
              "tag": "${{ github.ref_name }}",
              "message": "${{ github.event.head_commit.message }}",
              "image": "docker.io/vsuh/cron-tg:${{ github.ref_name }}"
            }
