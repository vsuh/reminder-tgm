---
name: Notify container repo on new tag

on:
  push:
    tags:
      - 'v*'

jobs:
  notify-container:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger container repo workflow
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: vsuh/cron-tg-docker
          event-type: new-reminder-tgm-tag
          client-payload: >
            {
              "tag": "${{ github.ref_name }}",
              "message": "${{ github.event.head_commit.message }}"
            }

      - name: Verify dispatch was sent
        run: |
          echo "✅ Dispatch sent to vsuh/cron-tg-docker"
          echo "   Event type: new-reminder-tgm-tag"
          echo "   Tag: ${{ github.ref_name }}"
          echo "   Check target repo Actions tab: https://github.com/vsuh/cron-tg-docker/actions"
